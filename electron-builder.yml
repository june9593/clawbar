appId: com.clawbar.app
productName: ClawBar
copyright: Copyright © 2026 june9593

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icon.png
  darkModeSupport: true
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization is opt-in per script: pack:mac:dmg:*:release overrides this to true
  # via -c.mac.notarize=true. Local dev (pack:mac:dmg:*) skips notarization.
  notarize: false

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.png
  # Not code-signed — users will see SmartScreen warning on first launch.
  artifactName: ${productName}-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ClawBar

portable:
  artifactName: ${productName}-${version}-win-portable-${arch}.${ext}

dmg:
  title: ClawBar ${version}
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

directories:
  output: release-artifacts

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"
  # ── BYO-CLI: drop the SDK's bundled Claude Code implementation; we drive
  # the user's installed `claude` binary via `pathToClaudeCodeExecutable`.
  # SDK 0.2.121 layout: the 205 MB native `claude` binary lives in
  # platform-specific optional packages (claude-agent-sdk-darwin-arm64 etc.);
  # the SDK's main package only ships JS, of which we need just `sdk.mjs`
  # + types — the bridge/assistant/browser entries are unused (sdk.mjs does
  # not import them).
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk-*/**/*"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/bridge.mjs"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/bridge.d.ts"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/assistant.mjs"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/assistant.d.ts"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/browser-sdk.js"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/browser-sdk.d.ts"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/manifest.json"
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk/manifest.zst.json"

asar: true
compression: maximum
npmRebuild: false
electronLanguages:
  - en
  - zh_CN
