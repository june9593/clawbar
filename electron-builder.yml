appId: com.clawbar.app
productName: ClawBar
copyright: Copyright © 2026 june9593

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icon.png
  darkModeSupport: true
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.png
  # Not code-signed — users will see SmartScreen warning on first launch.
  artifactName: ${productName}-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ClawBar

portable:
  artifactName: ${productName}-${version}-win-portable-${arch}.${ext}

dmg:
  title: ClawBar ${version}
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

directories:
  output: release-artifacts

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

asar: true
compression: maximum
npmRebuild: false
electronLanguages:
  - en
  - zh_CN
